<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JupyXL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="taskpane.css" />
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="mark">▮▮</span>
        <span class="name">JupyXL</span>
      </div>
      <div id="kernel-status" class="status pending">starting…</div>
    </header>

    <nav class="toolbar">
      <button id="btn-run-all" title="Run all cells (Ctrl+Shift+Enter)">▶ Run all</button>
      <button id="btn-add" title="Add cell below">+ Cell</button>
      <button id="btn-read-selection" title="Import selection as DataFrame">↓ Selection</button>
      <span class="spacer"></span>
      <span class="toolbar-sep"></span>
      <button id="btn-interrupt" class="icon" title="Interrupt kernel">■</button>
      <button id="btn-restart" class="icon" title="Restart kernel">↺</button>
      <button id="btn-settings" class="icon" title="Settings">⚙</button>
    </nav>

    <section id="settings" class="settings">
      <label for="kernel-url">Kernel endpoint</label>
      <div class="settings-row">
        <input id="kernel-url" type="text" spellcheck="false" placeholder="ws://localhost:8765/ws" />
        <button id="btn-connect">Connect</button>
      </div>
      <p class="hint">
        Run the kernel server locally (<code>python server/main.py</code>), or point this at a hosted
        <code>wss://</code> endpoint for the pure-web / mobile story.
      </p>

      <div class="account-panel">
        <div class="account-head">
          <span>Account</span>
          <span id="account-status" class="account-status">Not signed in</span>
        </div>
        <button id="btn-sign-out" class="sign-out-btn" type="button">Sign out</button>
      </div>
    </section>

    <main id="cells"></main>

    <footer class="footer">
      <span><kbd>Ctrl/⌘</kbd>+<kbd>↵</kbd> run · <kbd>Shift</kbd>+<kbd>↵</kbd> run + next · <kbd>Tab</kbd> indent</span>
    </footer>
  </div>

  <div id="auth-overlay" class="auth-overlay open" role="dialog" aria-modal="true" aria-labelledby="auth-title">
    <section class="auth-dialog">
      <div class="brand auth-brand">
        <span class="mark">▮▮</span>
        <span class="name">JupyXL</span>
      </div>
      <h1 id="auth-title">Sign in</h1>
      <div class="account-form">
        <input id="account-name" type="text" autocomplete="name" placeholder="Name" />
        <input id="account-email" type="email" autocomplete="email" placeholder="Email" />
        <input id="account-password" type="password" autocomplete="current-password" placeholder="Password" />
        <div class="account-actions">
          <button id="btn-login" type="button">Sign in</button>
          <button id="btn-create-account" type="button">Create account</button>
        </div>
      </div>
      <p id="auth-message" class="auth-message">Notebook sessions are saved after sign-in.</p>
    </section>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
