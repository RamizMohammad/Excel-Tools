name: Sync web to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.VPS }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy with Docker
        run: |
          ssh root@${{ secrets.VPS_IP }} bash << 'EOF'
            set -e
            echo "Starting deployment..."
            cd /root/Projects/Excel-Tools
            echo "===> Pulling latest code"
            git fetch origin main
            git reset --hard origin/main
            echo "===> Stopping old containers"
            docker compose down
            echo "===> Building new image"
            docker compose build --no-cache --progress=plain
            echo "===> Starting containers"
            docker compose up -d
            echo "===> Cleaning unused images"
            docker image prune -f
            echo "===> Waiting 15s for containers to stabilize..."
            sleep 15
            echo "===> Container status"
            docker compose ps
            echo "===> Deployment completed successfully"
          EOF

      - name: Notify Telegram (success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\",
              \"parse_mode\": \"HTML\",
              \"text\": \"вњ… <b>Deployment Successful</b>\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџ—‚ <b>Project:</b> deploy-server-web\nрџЊї <b>Branch:</b> <code>backend_production</code>\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџ“ќ <b>Commit:</b> <code>${{ github.sha }}</code>\nрџ’¬ <b>Message:</b> ${{ github.event.head_commit.message }}\nрџ‘¤ <b>Triggered by:</b> <a href='https://github.com/${{ github.actor }}'>${{ github.actor }}</a>\nрџ•ђ <b>Time:</b> $(date -u '+%Y-%m-%d %H:%M:%S UTC')\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџљЂ <i>Live on VPS</i>\"
            }"

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID_1 }}\",
              \"parse_mode\": \"HTML\",
              \"text\": \"вќЊ <b>Deployment Failed</b>\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџ—‚ <b>Project:</b> deploy-server-web\nрџЊї <b>Branch:</b> <code>backend_production</code>\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџ“ќ <b>Commit:</b> <code>${{ github.sha }}</code>\nрџ’¬ <b>Message:</b> ${{ github.event.head_commit.message }}\nрџ‘¤ <b>Triggered by:</b> <a href='https://github.com/${{ github.actor }}'>${{ github.actor }}</a>\nрџ•ђ <b>Time:</b> $(date -u '+%Y-%m-%d %H:%M:%S UTC')\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџ”Ќ <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'><b>View Failed Run в†’</b></a>\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nвљ пёЏ <i>Please investigate and re-deploy.</i>\"
            }"